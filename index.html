<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ДМ2 Мост-2 — Sales OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#07090f;--bg1:#0c0f1a;--bg2:#111520;--bg3:#171d2e;--bg4:#1d2438;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.13);
  --t1:#e8eaf2;--t2:#8892a6;--t3:#454d60;
  --blue:#4f8ef7;--blue-bg:rgba(79,142,247,.12);--blue-bd:rgba(79,142,247,.3);
  --green:#34d399;--green-bg:rgba(52,211,153,.11);--green-bd:rgba(52,211,153,.3);
  --amber:#f5a623;--amber-bg:rgba(245,166,35,.11);--amber-bd:rgba(245,166,35,.3);
  --red:#f87171;--red-bg:rgba(248,113,113,.11);--red-bd:rgba(248,113,113,.3);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.11);
  --sidebar:220px;--r:10px;--r2:14px;--bnav:64px;
}
html,body{height:100%;background:var(--bg0);color:var(--t1);font-family:'Outfit',system-ui,sans-serif;font-size:14px;line-height:1.5;overflow-x:hidden}

/* ═══ SIDEBAR (desktop) ═══ */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar);height:100vh;background:var(--bg1);border-right:1px solid var(--bd);display:flex;flex-direction:column;z-index:100}
.sb-logo{padding:22px 18px 18px;border-bottom:1px solid var(--bd)}
.sb-tag{font-size:9px;letter-spacing:4px;color:var(--blue);font-family:'IBM Plex Mono',monospace;font-weight:600;margin-bottom:5px}
.sb-name{font-size:16px;font-weight:700;letter-spacing:-.3px}
.sb-period{font-size:10px;color:var(--t3);margin-top:3px;font-family:'IBM Plex Mono',monospace}
.nav{flex:1;padding:14px 10px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);cursor:pointer;color:var(--t3);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;border:1px solid transparent;user-select:none}
.ni:hover{background:var(--bg3);color:var(--t1)}
.ni.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.ni svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.ni.active svg{opacity:1}
.sb-foot{padding:14px;border-top:1px solid var(--bd)}
.up-zone{border:1px dashed var(--bd2);border-radius:var(--r);padding:14px 12px;text-align:center;cursor:pointer;transition:all .2s;display:block;width:100%}
.up-zone:hover,.up-zone.drag{background:var(--blue-bg);border-color:var(--blue-bd)}
.up-zone input{display:none}
.sb-keys{font-size:10px;color:var(--t3);text-align:center;margin-top:8px}

/* ═══ MOBILE HEADER ═══ */
.mob-header{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg1);border-bottom:1px solid var(--bd);z-index:100;align-items:center;padding:0 16px;gap:12px}
.mob-logo{flex:1}
.mob-logo-t{font-size:14px;font-weight:700}
.mob-logo-s{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace}
.mob-up{padding:6px 12px;border-radius:var(--r);border:1px solid var(--bd2);background:transparent;color:var(--t2);font-size:11px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap}
.mob-up input{display:none}

/* ═══ BOTTOM NAV (mobile) ═══ */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bnav);background:var(--bg1);border-top:1px solid var(--bd);z-index:100;align-items:stretch}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--t3);font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:color .15s;border:none;background:transparent;font-family:'Outfit',sans-serif}
.bnav-item.active{color:var(--blue)}
.bnav-item svg{width:18px;height:18px}
.bnav-item.active svg{filter:drop-shadow(0 0 6px rgba(79,142,247,.5))}

/* ═══ MAIN ═══ */
.main{margin-left:var(--sidebar);min-height:100vh;padding:32px 36px;padding-bottom:20px}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.4px}
.page-sub{font-size:12px;color:var(--t3);margin-top:4px}
.btn{padding:7px 14px;border-radius:var(--r);border:1px solid var(--bd2);background:transparent;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.btn:hover{background:var(--bg3);color:var(--t1)}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:80px;right:16px;z-index:999;padding:11px 16px;border-radius:var(--r);font-size:12px;font-weight:500;transform:translateY(20px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;border:1px solid;max-width:280px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:#0c2018;color:var(--green);border-color:var(--green-bd)}
.toast.err{background:#200c0c;color:var(--red);border-color:var(--red-bd)}
.toast.info{background:#0c1420;color:var(--blue);border-color:var(--blue-bd)}

/* ═══ KPI ═══ */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:22px}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--a,var(--blue))}
.kpi-l{font-size:9px;letter-spacing:2px;color:var(--t3);font-weight:700;text-transform:uppercase;margin-bottom:8px}
.kpi-v{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--t1);line-height:1}
.kpi-s{font-size:10px;color:var(--t3);margin-top:5px}

/* ═══ CARD ═══ */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;margin-bottom:12px}
.card-h{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.card-t{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t3);text-transform:uppercase}

/* ═══ TABLE ═══ */
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase;border-bottom:1px solid var(--bd)}
td{padding:9px 14px;border-bottom:1px solid var(--bd);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:var(--bg3)}

/* ═══ TIER ═══ */
.tier{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;flex-shrink:0}
.tA{background:var(--green-bg);color:var(--green)}.tB{background:var(--blue-bg);color:var(--blue)}
.tC{background:var(--amber-bg);color:var(--amber)}.tD{background:var(--red-bg);color:var(--red)}

/* ═══ VS ═══ */
.vs{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;white-space:nowrap;display:inline-block}
.vp{background:var(--green-bg);color:var(--green)}.vn{background:var(--red-bg);color:var(--red)}.vz{background:var(--bg4);color:var(--t3)}
.mbar{display:flex;align-items:center;gap:6px}
.mbar-t{flex:1;height:4px;background:var(--bg4);border-radius:2px;min-width:40px;overflow:hidden}
.mbar-f{height:4px;border-radius:2px;transition:width .5s ease}
.rmono{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500}
.rbar{height:3px;background:var(--bg4);border-radius:2px;margin-top:4px;overflow:hidden}
.rbar-f{height:3px;background:var(--blue);border-radius:2px}

/* ═══ SPLIT / PANELS ═══ */
.split{display:grid;grid-template-columns:200px 1fr;gap:14px;align-items:start}
.list-panel{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;position:sticky;top:0;max-height:calc(100vh - 64px);overflow-y:auto}
.list-head{padding:10px 14px;border-bottom:1px solid var(--bd);font-size:9px;font-weight:700;letter-spacing:2px;color:var(--t3);text-transform:uppercase}
.li{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bd);border-left:3px solid transparent;transition:all .12s}
.li:last-child{border-bottom:none}
.li:hover{background:var(--bg3)}
.li.sel{background:var(--bg3);border-left-color:var(--blue)}
.li-name{font-size:12px;font-weight:500}
.li-sub{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace;margin-top:2px}

/* ═══ SELLER PROFILE ═══ */
.profile{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:18px;margin-bottom:12px}
.pname{font-size:20px;font-weight:700;letter-spacing:-.4px;margin-bottom:6px}
.pm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:9px;overflow:hidden;margin:14px 0}
.pm-item{background:var(--bg2);padding:12px 14px}
.pm-l{font-size:9px;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase;font-weight:700;margin-bottom:5px}
.pm-v{font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.vs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.vs-lbl{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.cat-row{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--bd)}
.cat-row:last-child{border-bottom:none}
.cat-name{flex:1;font-size:12px}
.cat-rev{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--t2);min-width:90px;text-align:right}

/* ═══ PLAN ═══ */
.plan-prog-wrap{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
.plan-prog{height:4px;background:var(--bg4);border-radius:2px;margin:8px 0 6px;overflow:hidden}
.plan-prog-f{height:4px;border-radius:2px;background:var(--green);transition:width .5s ease}
.day-block{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.day-h{padding:9px 16px;background:var(--bg3);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.day-lbl{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t2);text-transform:uppercase}
.day-body{padding:8px 12px}
.action{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:8px;border:1px solid var(--bd);margin-bottom:6px;cursor:pointer;transition:all .12s}
.action:last-child{margin-bottom:0}
.action:hover{border-color:var(--bd2);background:var(--bg3)}
.action.done{opacity:.35}
.action.done .atxt{text-decoration:line-through}
.chk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--bd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;margin-top:2px;transition:all .15s}
.chk.on{background:var(--green);border-color:var(--green)}
.abadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:3px;letter-spacing:.5px;text-transform:uppercase}
.atxt{font-size:12px;color:var(--t2);line-height:1.5}

/* ═══ WEEKLY RHYTHM ═══ */
.rhythm-grid{display:flex;flex-direction:column;gap:10px}
.rday{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.rday-head{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.rday-icon{font-size:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:8px;flex-shrink:0}
.rday-name{font-size:14px;font-weight:700;color:var(--t1)}
.rday-focus{font-size:11px;color:var(--t2);margin-top:2px}
.rday-prog{margin-left:auto;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--t3)}
.rday-body{padding:14px 18px}
.rday-section{margin-bottom:14px}
.rday-section:last-child{margin-bottom:0}
.rday-s-title{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:8px}
.rtask{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;border-radius:8px;border:1px solid var(--bd);margin-bottom:6px;cursor:pointer;transition:all .12s}
.rtask:last-child{margin-bottom:0}
.rtask:hover{border-color:var(--bd2);background:var(--bg3)}
.rtask.done{opacity:.38}
.rtask.done .rtask-txt{text-decoration:line-through;color:var(--t3)}
.rtask-txt{font-size:12px;color:var(--t2);line-height:1.55;flex:1}
.rnote{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:8px;margin-top:10px}
.rnote-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.rnote-txt{font-size:11px;color:var(--blue);line-height:1.55}
.rexample{padding:10px 14px;background:var(--bg3);border-left:3px solid var(--amber);border-radius:0 6px 6px 0;font-size:12px;color:var(--t2);line-height:1.6;font-style:italic;margin-top:8px}
.rday-mini-prog{height:3px;background:var(--bg4);border-radius:2px;margin-top:8px;overflow:hidden}
.rday-mini-prog-f{height:3px;border-radius:2px;background:var(--green);transition:width .4s ease}
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.week-info{font-size:11px;color:var(--t3)}
.week-reset{padding:5px 12px;border-radius:var(--r);border:1px solid var(--red-bd);background:transparent;color:var(--red);font-size:11px;cursor:pointer;font-family:'Outfit',sans-serif}
.week-progress{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.wp-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:8px}
.wp-bar-f{height:6px;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--green));transition:width .6s ease}

/* ═══ FOCUS ═══ */
.focus-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;transition:border .15s}
.fc:hover{border-color:var(--bd2)}
.fbadge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:1px;text-transform:uppercase;display:inline-block;margin-bottom:8px}
.fname{font-size:13px;font-weight:600;margin-bottom:4px}
.fsub{font-size:11px;color:var(--t2);line-height:1.6}
.flink{margin-top:8px;font-size:11px;color:var(--blue);cursor:pointer;font-weight:500;display:inline-block}

/* ═══ SEARCH ═══ */
.search-wrap{position:relative;margin-bottom:12px}
.search{width:100%;padding:9px 14px 9px 36px;border-radius:var(--r);border:1px solid var(--bd);background:var(--bg2);color:var(--t1);font-size:13px;font-family:'Outfit',sans-serif;outline:none;transition:border .15s}
.search:focus{border-color:var(--bd2)}
.search::placeholder{color:var(--t3)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:5px 12px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-size:11px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .12s}
.pill:hover{border-color:var(--bd2);color:var(--t1)}
.pill.on{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue)}

/* ═══ MOBILE OVERLAY (seller detail) ═══ */
.mob-overlay{display:none;position:fixed;top:56px;left:0;right:0;bottom:var(--bnav);background:var(--bg0);z-index:90;overflow-y:auto;padding:16px;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.mob-back{display:flex;align-items:center;gap:8px;margin-bottom:16px;color:var(--blue);font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;font-family:'Outfit',sans-serif}

/* ═══ MISC ═══ */
.empty{color:var(--t3);font-size:13px;padding:40px;text-align:center}
.anim{animation:fadeUp .22s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .sidebar{display:none}
  .mob-header{display:flex}
  .bnav{display:flex}
  .main{margin-left:0;padding:72px 14px calc(var(--bnav) + 16px);min-height:100vh}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .kpi{padding:12px}
  .kpi-v{font-size:16px}
  .split{grid-template-columns:1fr}
  .list-panel{position:static;max-height:none}
  .focus-grid{grid-template-columns:1fr}
  .page-head{margin-bottom:16px}
  .page-title{font-size:18px}
  .mob-overlay{display:none}
  .mob-overlay.visible{display:block}
  .hide-mobile{display:none!important}
  .toast{bottom:calc(var(--bnav) + 12px);right:12px}
  .pm-grid{grid-template-columns:repeat(3,1fr)}
  .pm-v{font-size:15px}
  .pname{font-size:17px}
  table th:nth-child(n+5),table td:nth-child(n+5){display:none}
}
@media(min-width:769px){
  .mob-overlay,.mob-back,.mob-header,.bnav{display:none!important}
  .detail-panel-wrap{display:block!important}
}
@media print{.sidebar,.toast,.bnav,.mob-header{display:none!important}.main{margin-left:0!important;padding:16px!important}}
</style>
</head>
<body>

<!-- ═══ SIDEBAR (desktop) ═══ -->
<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-tag">Sales OS</div>
    <div class="sb-name" id="sbName">ДМ2 Мост-2</div>
    <div class="sb-period" id="sbPeriod">Квітень 2026</div>
  </div>
  <nav class="nav">
    <div class="ni active" data-v="overview" onclick="go('overview')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.2"/><rect x="9" y="1" width="6" height="6" rx="1.2"/><rect x="1" y="9" width="6" height="6" rx="1.2"/><rect x="9" y="9" width="6" height="6" rx="1.2"/></svg>
      Огляд
    </div>
    <div class="ni" data-v="sellers" onclick="go('sellers')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="2.5"/><path d="M1 13c0-2.76 2.24-5 5-5s5 2.24 5 5"/><circle cx="12.5" cy="5.5" r="1.8"/><path d="M15 12c0-1.66-1.12-2.5-2.5-2.5"/></svg>
      Продавці
    </div>
    <div class="ni" data-v="categories" onclick="go('categories')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h12M2 12h12"/><circle cx="5" cy="4" r="1.2" fill="currentColor" stroke="none"/><circle cx="8" cy="8" r="1.2" fill="currentColor" stroke="none"/><circle cx="11" cy="12" r="1.2" fill="currentColor" stroke="none"/></svg>
      Категорії
    </div>
    <div class="ni" data-v="plan" onclick="go('plan')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="1.5"/><path d="M5.5 8l2 2 3.5-3.5"/></svg>
      План дій

const fmt=n=>new Intl.NumberFormat('uk-UA').format(Math.round(n));
const pct=n=>(n==null?'—':(n>=0?'+':'')+Math.round(n*100)+'%');
const avg=a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0;
const tc=t=>({A:'tA',B:'tB',C:'tC',D:'tD'}[t]||'tD');
const vc=v=>v>=.03?'vp':v<=-.03?'vn':'vz';
const adef=t=>ACTDEF.find(a=>a.type===t)||ACTDEF[0];
const isMobile=()=>window.innerWidth<=768;

function assignTiers(arr){
  const pos=arr.filter(s=>s.revenue>0).sort((a,b)=>b.revenue-a.revenue);
  const n=pos.length;
  pos.forEach((s,i)=>{
    s.tier=i<Math.ceil(n*.36)?'A':i<Math.ceil(n*.55)?'B':i<Math.ceil(n*.82)?'C':'D';
  });
  arr.filter(s=>s.revenue<=0).forEach(s=>s.tier='D');
  return arr;
}

function buildCatIndex(sellers){
  const m={};
  sellers.forEach(s=>(s.cats||[]).forEach(c=>{
    if(!m[c.cat])m[c.cat]={cat:c.cat,biz:c.biz||getBiz(c.cat),sellers:[]};
    m[c.cat].sellers.push({name:s.name,full:s.full,rev:c.rev,units:c.units||0,revVs:c.revVs,aspVs:c.aspVs,tier:s.tier});
  }));
  return Object.values(m).sort((a,b)=>a.cat.localeCompare(b.cat));
}

function getWeekKey(){
  const d=new Date();
  const start=new Date(d.getFullYear(),0,1);
  const wk=Math.ceil((((d-start)/86400000)+start.getDay()+1)/7);
  return `dm2_rw_${d.getFullYear()}_${wk}`;
}

function toast(msg,type='info'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type+' show';
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3500);
}

function vsBar(v,max=2){
  const c=Math.max(-max,Math.min(max,v||0));
  const p=Math.round(Math.abs(c)/max*100);
  const col=v>=0?'#34d399':'#f87171';
  return `<div class="mbar"><div class="mbar-t"><div class="mbar-f" style="width:${p}%;background:${col}"></div></div><span class="vs ${vc(v)}">${pct(v)}</span></div>`;
}

// PARSE FILE
// ═══════════════════════════════════════════════════════════════
function parseFile(ab){
  const wb=XLSX.read(ab,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  const sm={};
  for(let i=18;i<rows.length;i++){
    const r=rows[i];
    if(String(r[7]||'').trim()!=='Прод')continue;
    const brand=String(r[4]||'').trim();
    if(brand&&brand!=='nan'&&brand.length>2&&!/^\s+$/.test(brand))continue;
    const seller=String(r[5]||'').trim();
    if(!seller||seller.length<3||/^\s+$/.test(seller))continue;
    const cat=String(r[2]||'').trim();if(!cat)continue;
    const biz=String(r[3]||'').trim()||getBiz(cat);
    const rev=parseFloat(r[9])||0,revVs=parseFloat(r[11])||0;
    const units=parseFloat(r[12])||0,unitsVs=parseFloat(r[14])||0,aspVs=parseFloat(r[17])||0;
    const sn=SHORT[seller]||seller.split(' ').slice(0,2).join(' ');
    if(!sm[seller])sm[seller]={name:sn,full:seller,revenue:0,units:0,rv:[],av:[],uv:[],cats:{}};
    sm[seller].revenue+=rev;sm[seller].units+=units;
    sm[seller].rv.push(revVs);sm[seller].av.push(aspVs);sm[seller].uv.push(unitsVs);
    if(rev>0){
      if(!sm[seller].cats[cat])sm[seller].cats[cat]={rev:0,units:0,rv:[],av:[],biz};
      sm[seller].cats[cat].rev+=rev;sm[seller].cats[cat].units+=units;
      sm[seller].cats[cat].rv.push(revVs);sm[seller].cats[cat].av.push(aspVs);
    }
  }
  const sellers=Object.values(sm).map(s=>({
    name:s.name,full:s.full,revenue:s.revenue,units:s.units,
    asp:s.units>0?s.revenue/s.units:0,
    revVs:avg(s.rv),aspVs:avg(s.av),unitsVs:avg(s.uv),
    cats:Object.entries(s.cats).map(([cat,v])=>({cat,biz:v.biz,rev:v.rev,units:v.units,revVs:avg(v.rv),aspVs:avg(v.av)})).sort((a,b)=>b.rev-a.rev)
  })).sort((a,b)=>b.revenue-a.revenue);
  return{sellers:assignTiers(sellers),cats:buildCatIndex(sellers)};
}

function renderKPI(){

  const totU=s.reduce((a,x)=>a+x.units,0);

  const vsA=s.length?avg(s.map(x=>x.revVs)):0;
  const d=s.filter(x=>x.tier==='D').length;
  const defs=[
    {l:'Виторг',v:fmt(totR)+' ₴',s:'за поточний період',a:'var(--blue)'},
    {l:'Штуки',v:fmt(totU),s:'продаж',a:'var(--purple)'},
    {l:'Сер. чек',v:fmt(aspA)+' ₴',s:'грн на шт.',a:'var(--green)'},
    {l:'Vs бенчмарк',v:pct(vsA),s:'виторг до ср. маг.',a:vsA>=0?'var(--green)':'var(--red)'},
    {l:'Продавців',v:String(s.length),s:`тир D: ${d}`,a:d>0?'var(--red)':'var(--amber)'}
  ];
  document.getElementById('kpiRow').innerHTML=defs.map(k=>`

      <div class="kpi-v" style="color:${k.a}">${k.v}</div>
      <div class="kpi-s">${k.s}</div>

}

          <thead><tr><th>#</th><th>Продавець</th><th>Тир</th><th>Виторг ₴</th><th class="hide-mobile">Шт</th><th class="hide-mobile">ASP</th><th>Виторг vs</th><th class="hide-mobile">ASP vs</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
      ${['A','B','C','D'].map(t=>{
        const lb={A:'Лідери',B:'Вище середнього',C:'Середні',D:'Потребують уваги'};
        return `<span class="tier ${tc(t)}" style="width:auto;padding:2px 10px;border-radius:5px;font-size:11px">${t} — ${lb[t]}</span>`;
      }).join('')}
    </div>`;
}

function renderSellers(){
  const sellers=S.sellers.filter(s=>s.revenue>0).sort((a,b)=>b.revenue-a.revenue);
  const q=S.search.toLowerCase();
  const filtered=q?sellers.filter(s=>s.full.toLowerCase().includes(q)):sellers;
  const list=filtered.map(s=>`
    <div class="li${S.selSeller===s.name?' sel':''}" onclick="sellerClick('${s.name}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="li-name">${s.full}</div>
        <span class="tier ${tc(s.tier)}" style="width:20px;height:20px;font-size:10px">${s.tier}</span>
      </div>
      <div class="li-sub">${fmt(s.revenue)} ₴ · ${s.units} шт</div>
    </div>`).join('');
  const detail=S.selSeller?(()=>{
    const s=sellers.find(x=>x.name===S.selSeller);
    return s?sellerDetailHTML(s,sellers):`<div class="empty">Не знайдено</div>`;
  })():`<div class="empty">← Оберіть продавця</div>`;

  return `
    <div class="split">
      <div>
        <div class="search-wrap">
          <svg class="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg>
          <input class="search" placeholder="Пошук продавця..." value="${S.search}" oninput="S.search=this.value;render()">
        </div>
        <div class="list-panel"><div class="list-head">Продавці</div>${list}</div>
      </div>
      <div class="detail-panel-wrap">${detail}</div>
    </div>`;
}

function renderCategories(){
  const allCats=S.cats.length?S.cats:buildCatIndex(S.sellers);
  if(!allCats.length)return`<div class="empty">Завантажте звіт (.xlsx) для аналізу категорій</div>`;
  const cats=S.bizFilter==='all'?allCats:allCats.filter(c=>c.biz===S.bizFilter);
  const bizPills=['all','ДП техніка','Аксесуари'].map(b=>`
    <button class="pill${S.bizFilter===b?' on':''}" onclick="S.bizFilter='${b}';S.selCat=null;render()">${b==='all'?'Всі бізнеси':b}</button>`).join('');
  const list=cats.map(c=>`
    <div class="li${S.selCat===c.cat?' sel':''}" onclick="S.selCat='${c.cat}';render()">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="li-name">${c.cat}</div>
        <span style="font-size:9px;padding:1px 5px;border-radius:3px;${c.biz==='Аксесуари'?'background:var(--purple-bg);color:var(--purple)':'background:var(--blue-bg);color:var(--blue)'}">${c.biz==='Аксесуари'?'АСС':'ДП'}</span>
      </div>
      <div class="li-sub">${c.sellers.length} продавців · ${c.sellers.reduce((a,s)=>a+(s.units||0),0)} шт</div>
    </div>`).join('');
  let detail=`<div class="empty">← Оберіть категорію</div>`;
  if(S.selCat){
    const c=allCats.find(x=>x.cat===S.selCat);
    if(c){
      const sorted=[...c.sellers].sort((a,b)=>b.rev-a.rev);
      const maxU=Math.max(...sorted.map(s=>s.units||0),1);
      const rows=sorted.map((s,i)=>`
        <div style="display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--bd)">
          <div style="font-size:11px;color:var(--t3);font-family:'IBM Plex Mono',monospace;min-width:18px">${i+1}</div>
          <span class="tier ${tc(s.tier)}" style="width:20px;height:20px;font-size:10px">${s.tier}</span>
          <div style="flex:1;font-size:12px;font-weight:500">${s.full||s.name}</div>
          <div style="width:36px;text-align:center">
            <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--t1)">${s.units||0}</div>
            <div style="height:3px;background:var(--bg4);border-radius:2px;margin-top:3px;overflow:hidden"><div style="height:3px;background:var(--blue);border-radius:2px;width:${Math.round((s.units||0)/maxU*100)}%"></div></div>
            <div style="font-size:9px;color:var(--t3)">шт</div>
          </div>
          <div style="width:75px">${vsBar(s.revVs,3)}</div>
          <div style="width:70px">${vsBar(s.aspVs,3)}</div>
          <div class="rmono hide-mobile" style="font-size:11px;color:var(--t2);min-width:88px;text-align:right">${fmt(s.rev)} ₴</div>
        </div>`).join('');
      const totRev=sorted.reduce((a,s)=>a+s.rev,0);
      const totUnits=sorted.reduce((a,s)=>a+(s.units||0),0);
      detail=`<div class="card">
        <div class="card-h">
          <div>
            <span class="card-t">${S.selCat}</span>
            <span style="margin-left:8px;font-size:9px;padding:1px 6px;border-radius:3px;${c.biz==='Аксесуари'?'background:var(--purple-bg);color:var(--purple)':'background:var(--blue-bg);color:var(--blue)'}">${c.biz}</span>
          </div>
          <span style="font-size:11px;color:var(--t3)">${fmt(totUnits)} шт · ${fmt(totRev)} ₴</span>
        </div>
        <div style="padding:7px 14px;border-bottom:1px solid var(--bd);display:flex;gap:8px;font-size:9px;color:var(--t3);font-weight:700;letter-spacing:1px;text-transform:uppercase">
          <div style="min-width:38px"></div><div style="flex:1">Продавець</div>
          <div style="width:36px;text-align:center">Шт</div>
          <div style="width:75px">Вир.vs</div><div style="width:70px">ASP vs</div>
          <div class="hide-mobile" style="min-width:88px;text-align:right">Виторг ₴</div>
        </div>
        <div>${rows}</div>
      </div>`;
    }
  }
  return `
    <div class="pills">${bizPills}</div>
    <div class="split"><div class="list-panel"><div class="list-head">Категорії</div>${list}</div><div>${detail}</div></div>`;
}

function renderPlan(){
  const sellers=S.sellers.filter(s=>s.revenue>0).sort((a,b)=>b.revenue-a.revenue);
  const list=sellers.map(s=>`
    <div class="li${S.selSeller===s.name?' sel':''}" onclick="planSelClick('${s.name}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="li-name">${s.full}</div>
        <span class="tier ${tc(s.tier)}" style="width:20px;height:20px;font-size:10px">${s.tier}</span>
      </div>
    </div>`).join('');

  let detail=`<div class="empty">← Оберіть продавця щоб переглянути план дій на тиждень</div>`;
  if(S.selSeller){
    const s=sellers.find(x=>x.name===S.selSeller);
    const plan=PLANS[S.selSeller]||PLANS.default;
    const tot=plan.reduce((a,d)=>a+d.actions.length,0);
    const done=plan.reduce((a,d,di)=>a+d.actions.filter((_,ai)=>S.checks[`${S.selSeller}-${di}-${ai}`]).length,0);
    const prog=tot>0?Math.round(done/tot*100):0;
    const days=plan.map((day,di)=>{
      const items=day.actions.map((a,ai)=>{
        const k=`${S.selSeller}-${di}-${ai}`,dn=!!S.checks[k],ad=adef(a.type);
        return `<div class="action${dn?' done':''}" onclick="toggleCheck('${k}')">
          <div class="chk${dn?' on':''}">${dn?'✓':''}</div>
          <div><span class="abadge" style="background:${ad.bg};color:${ad.color}">${ad.label}</span><div class="atxt">${a.text}</div></div>
        </div>`;
      }).join('');
      const dc=day.actions.filter((_,ai)=>S.checks[`${S.selSeller}-${di}-${ai}`]).length;
      return `<div class="day-block">
        <div class="day-h"><span class="day-lbl">${day.day}</span><span style="font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace">${dc}/${day.actions.length}</span></div>
        <div class="day-body">${items}</div>
      </div>`;
    }).join('');
    detail=`
      <div class="plan-prog-wrap">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px">
          <span style="font-size:13px;font-weight:600">${s?.full||S.selSeller}</span>
          <span style="font-size:11px;color:var(--t3);font-family:'IBM Plex Mono',monospace">${done}/${tot} · ${prog}%</span>
        </div>
        <div class="plan-prog"><div class="plan-prog-f" style="width:${prog}%"></div></div>
        <div style="font-size:10px;color:var(--t3)">Прогрес зберігається між сесіями</div>
      </div>
      ${days}
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px">
        ${ACTDEF.map(a=>`<span style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;background:${a.bg};color:${a.color};letter-spacing:.5px;text-transform:uppercase">${a.label}</span>`).join('')}
      </div>`;
  }
  return `<div class="split">
    <div class="list-panel"><div class="list-head">Оберіть продавця</div>${list}</div>
    <div class="detail-panel-wrap">${detail}</div>
  </div>`;
}

function renderRhythm(){
  const totAll=WEEK_RHYTHM.reduce((a,d)=>a+d.sections.reduce((b,s)=>b+s.tasks.length,0),0);
  const doneAll=Object.values(S.rhythmChecks).filter(Boolean).length;
  const progAll=totAll>0?Math.round(doneAll/totAll*100):0;
  const wk=getWeekKey().replace('dm2_rw_','');
  const days=WEEK_RHYTHM.map((day,di)=>{
    const dayTot=day.sections.reduce((a,s)=>a+s.tasks.length,0);
    const dayDone=day.sections.reduce((a,s)=>a+s.tasks.filter(t=>S.rhythmChecks[t.id]).length,0);
    const dayProg=dayTot>0?Math.round(dayDone/dayTot*100):0;
    const sections=day.sections.map(sec=>`
      <div class="rday-section">
        <div class="rday-s-title">${sec.title}</div>
        ${sec.tasks.map(task=>{
          const dn=!!S.rhythmChecks[task.id];
          return `<div class="rtask${dn?' done':''}" onclick="toggleRhythm('${task.id}')">
            <div class="chk${dn?' on':''}">${dn?'✓':''}</div>
            <div class="rtask-txt">${task.text}</div>
          </div>`;
        }).join('')}
      </div>`).join('');
    const ex=day.example?`<div class="rexample">${day.example}</div>`:'';
    const note=day.note?`<div class="rnote"><div class="rnote-icon">👉</div><div class="rnote-txt">${day.note}</div></div>`:'';
    return `<div class="rday">
      <div class="rday-head">
        <div class="rday-icon">${day.icon}</div>
        <div>
          <div class="rday-name">${day.day}</div>
          <div class="rday-focus">${day.focus}</div>
          <div class="rday-mini-prog"><div class="rday-mini-prog-f" style="width:${dayProg}%"></div></div>
        </div>
        <div class="rday-prog">${dayDone}/${dayTot}</div>
      </div>
      <div class="rday-body">${sections}${ex}${note}</div>
    </div>`;
  }).join('');

  return `
    <div class="week-header">
      <div>
        <div style="font-size:14px;font-weight:600">Менеджерський ритм тижня</div>
        <div class="week-info">Тиждень: ${wk} · ${doneAll} з ${totAll} задач виконано</div>
      </div>
      <button class="week-reset" onclick="resetRhythm()">Новий тиждень</button>
    </div>
    <div class="week-progress">
      <div>
        <div style="font-size:12px;font-weight:500">Загальний прогрес тижня</div>
        <div class="wp-bar"><div class="wp-bar-f" style="width:${progAll}%"></div></div>
      </div>
      <div style="font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:${progAll>=70?'var(--green)':progAll>=40?'var(--amber)':'var(--red)'}">${progAll}%</div>
    </div>
    <div class="rhythm-grid">${days}</div>`;
}

function renderFocus(){
  const active=S.sellers.filter(s=>s.revenue>0).sort((a,b)=>a.revVs-b.revVs);
  const urgent=active.filter(s=>s.tier==='D');
  const aspWeak=active.filter(s=>s.aspVs<-.1&&s.tier!=='D').slice(0,3);
  const stars=active.filter(s=>s.revVs>.3&&s.tier==='A').slice(0,2);
  const allC={};
  S.sellers.forEach(s=>(s.cats||[]).forEach(c=>{
    if(!allC[c.cat])allC[c.cat]={cat:c.cat,total:0};
    allC[c.cat].total+=c.rev;
  }));
  const topC=Object.values(allC).sort((a,b)=>b.total-a.total).slice(0,5);

  const fc=(title,badge,bsty,items,empty)=>`<div>
    <div style="font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:8px">${title}</div>
    ${items.length?items.map(it=>`<div class="fc">
      <div class="fbadge" style="${bsty}">${badge}</div>
      <div class="fname">${it.full||it.name}</div>
      <div class="fsub">${it.sub}</div>
      ${it.link?`<span class="flink" onclick="${it.link}">Відкрити план дій →</span>`:''}
    </div>`).join(''):`<div class="fc"><div style="color:var(--t3);font-size:12px">${empty}</div></div>`}
  </div>`;

  return `<div class="focus-grid">
    ${fc('Термінові дії','Тир D · Увага','background:var(--red-bg);color:var(--red)',
      urgent.map(s=>({...s,sub:`Виторг нижче бенчм. на ${pct(Math.abs(s.revVs))}. Особиста бесіда — сьогодні.`,
        link:`go('plan');S.selSeller='${s.name}';render()`})),'Немає критичних ситуацій')}
    ${fc('Низький ASP','Увага ASP','background:var(--amber-bg);color:var(--amber)',
      aspWeak.map(s=>({...s,sub:`ASP vs: ${pct(s.aspVs)}. Рекомендація: тренінг апселлу цього тижня`})),'ASP в нормі')}
    ${fc('Лідери → наставники','Тир A · Лідер','background:var(--green-bg);color:var(--green)',
      stars.map(s=>({...s,sub:`Виторг ${pct(s.revVs)} vs бенчм. Може навчати продавців тиру D`})),'Завантажте звіт')}
    <div>
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:8px">Топ категорії</div>
      <div class="card">
        ${topC.length?topC.map((c,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--bd)">
          <div style="font-size:11px;color:var(--t3);font-family:'IBM Plex Mono',monospace;min-width:18px">${i+1}</div>
          <div style="flex:1;font-size:12px;font-weight:500">${c.cat}</div>
          <div class="rmono" style="font-size:11px;color:var(--t2)">${fmt(c.total)} ₴</div>
        </div>`).join(''):`<div class="empty" style="padding:16px">Завантажте звіт</div>`}
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// MOBILE INTERACTIONS
// ═══════════════════════════════════════════════════════════════
function sellerClick(name){
  if(isMobile()){
    S.selSeller=name;
    openMobOverlay(name);
  } else {
    S.selSeller=S.selSeller===name?null:name;
    if(S.view==='overview'){S.view='sellers';}
    render();
  }
}

function planSelClick(name){
  if(isMobile()){
    S.selSeller=name;
    openMobPlanOverlay(name);
  } else {
    S.selSeller=S.selSeller===name?null:name;
    render();
  }
}

function openMobOverlay(name){
  const sellers=S.sellers.filter(s=>s.revenue>0).sort((a,b)=>b.revenue-a.revenue);
  const s=sellers.find(x=>x.name===name);
  if(!s)return;
  document.getElementById('mobOverlayContent').innerHTML=sellerDetailHTML(s,sellers);
  document.getElementById('mobOverlay').classList.add('visible');
}

function openMobPlanOverlay(name){
  const sellers=S.sellers.filter(s=>s.revenue>0).sort((a,b)=>b.revenue-a.revenue);
  const s=sellers.find(x=>x.name===name);
  const plan=PLANS[name]||PLANS.default;
  const tot=plan.reduce((a,d)=>a+d.actions.length,0);
  const done=plan.reduce((a,d,di)=>a+d.actions.filter((_,ai)=>S.checks[`${name}-${di}-${ai}`]).length,0);
  const prog=tot>0?Math.round(done/tot*100):0;
  const days=plan.map((day,di)=>{
    const items=day.actions.map((a,ai)=>{
      const k=`${name}-${di}-${ai}`,dn=!!S.checks[k],ad=adef(a.type);
      return `<div class="action${dn?' done':''}" onclick="toggleCheckMob('${k}','${name}')">
        <div class="chk${dn?' on':''}">${dn?'✓':''}</div>
        <div><span class="abadge" style="background:${ad.bg};color:${ad.color}">${ad.label}</span><div class="atxt">${a.text}</div></div>
      </div>`;
    }).join('');
    const dc=day.actions.filter((_,ai)=>S.checks[`${name}-${di}-${ai}`]).length;
    return `<div class="day-block">
      <div class="day-h"><span class="day-lbl">${day.day}</span><span style="font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace">${dc}/${day.actions.length}</span></div>
      <div class="day-body">${items}</div>
    </div>`;
  }).join('');
  document.getElementById('mobOverlayContent').innerHTML=`
    <div class="plan-prog-wrap">
      <div style="display:flex;justify-content:space-between;margin-bottom:2px">
        <span style="font-size:13px;font-weight:600">${s?.full||name}</span>
        <span style="font-size:11px;color:var(--t3);font-family:'IBM Plex Mono',monospace">${prog}%</span>
      </div>
      <div class="plan-prog"><div class="plan-prog-f" style="width:${prog}%"></div></div>
    </div>
    ${days}`;
  document.getElementById('mobOverlay').classList.add('visible');
}

function closeMobOverlay(){
  document.getElementById('mobOverlay').classList.remove('visible');
}

function toggleCheckMob(k,name){
  S.checks[k]=!S.checks[k];
  saveState();
  openMobPlanOverlay(name);
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render(){
  renderKPI();
  closeMobOverlay();
  const titles={overview:'Огляд магазину',sellers:'Продавці',categories:'Категорії',plan:'План дій',rhythm:'Ритм тижня',focus:'Фокус дня'};
  document.getElementById('pageTitle').textContent=titles[S.view]||'';
  const el=document.getElementById('content');
  el.className='anim';void el.offsetWidth;
  if(S.view==='overview')el.innerHTML=renderOverview();
  else if(S.view==='sellers')el.innerHTML=renderSellers();
  else if(S.view==='categories')el.innerHTML=renderCategories();
  else if(S.view==='plan')el.innerHTML=renderPlan();
  else if(S.view==='rhythm')el.innerHTML=renderRhythm();
  else if(S.view==='focus')el.innerHTML=renderFocus();
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
function go(v){
  S.view=v;S.selSeller=null;S.selCat=null;
  document.querySelectorAll('[data-v]').forEach(el=>el.classList.toggle('active',el.dataset.v===v));
  render();
}

function toggleCheck(k){S.checks[k]=!S.checks[k];saveState();render()}
function toggleRhythm(id){S.rhythmChecks[id]=!S.rhythmChecks[id];saveState();render()}
function resetRhythm(){if(confirm('Скинути прогрес поточного тижня?')){S.rhythmChecks={};saveState();render();toast('Ритм тижня скинуто','info')}}

// ═══════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════
function saveState(){
  try{
    localStorage.setItem('dm2_checks_v3',JSON.stringify(S.checks));
    localStorage.setItem(getWeekKey(),JSON.stringify(S.rhythmChecks));
  }catch(e){}
}
function loadState(){
  try{
    const c=localStorage.getItem('dm2_checks_v3');if(c)S.checks=JSON.parse(c);
    const r=localStorage.getItem(getWeekKey());if(r)S.rhythmChecks=JSON.parse(r);
  }catch(e){}
}

// ═══════════════════════════════════════════════════════════════
// FILE UPLOAD
// ═══════════════════════════════════════════════════════════════
function handleFile(file){
  if(!file)return;
  toast('Читаємо файл...','info');
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const{sellers,cats}=parseFile(new Uint8Array(ev.target.result));
      if(!sellers.length){toast('Не знайдено даних. Перевірте формат.','err');return;}
      S.sellers=sellers;S.cats=cats;S.selSeller=null;S.selCat=null;
      const name=file.name.replace(/\.(xlsx|xls)$/i,'');
      ['sbPeriod','mobPeriod'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=name;});
      document.getElementById('pageSub').textContent=`${name} · ${sellers.length} продавців`;
      toast(`Завантажено: ${sellers.length} продавців`,'ok');
      render();
    }catch(e){toast('Помилка: '+e.message,'err');}
  };
  reader.readAsArrayBuffer(file);
}

// ═══════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════
['fileInput','fileInputMob'].forEach(id=>{
  const el=document.getElementById(id);
  if(el)el.addEventListener('change',e=>{handleFile(e.target.files[0]);e.target.value='';});
});

const dz=document.getElementById('dropZone');
if(dz){
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFile(e.dataTransfer.files[0]);});
}

document.addEventListener('keydown',e=>{
  const map={'1':'overview','2':'sellers','3':'categories','4':'plan','5':'rhythm','6':'focus'};
  if(map[e.key]&&!e.ctrlKey&&!e.metaKey&&!e.altKey&&document.activeElement.tagName!=='INPUT'){go(map[e.key]);}
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
loadState();
S.sellers=assignTiers(DEFAULT_SELLERS.map(s=>({...s})));
S.cats=buildCatIndex(S.sellers);
render();
</script>
</body>
</html>
